<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <form [formGroup]="loginForm" (ngSubmit)="entrar()" class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold text-orange-600 mb-6 text-center">Foodly Login</h2>
    
    <div class="mb-4">
      <label class="block text-sm font-medium">E-mail</label>
      <input formControlName="email" type="email" class="w-full border rounded p-2 outline-none focus:ring-2 focus:ring-orange-500">
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium">Senha</label>
      <input formControlName="senha" type="password" class="w-full border rounded p-2 outline-none focus:ring-2 focus:ring-orange-500">
    </div>

    <button type="submit" [disabled]="loginForm.invalid" class="w-full bg-orange-500 text-white py-2 rounded font-bold hover:bg-orange-600 disabled:bg-gray-300">
      Entrar
    </button>
    
    <p class="mt-4 text-center text-sm">
      Não tem conta? <a href="/cadastro" class="text-orange-500">Criar conta</a>
    </p>
  </form>
</div>
