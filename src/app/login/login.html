<div class="min-h-screen bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50 flex items-center justify-center p-4 font-sans relative overflow-hidden">

  <div class="absolute -top-24 -right-24 w-72 h-72 bg-green-200/30 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-24 -left-24 w-72 h-72 bg-teal-200/30 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative bg-white/90 backdrop-blur-md p-10 rounded-[2.5rem] shadow-2xl shadow-green-100/50 w-full max-w-[420px] border border-green-100">

    <a routerLink="/" class="flex items-center gap-2 text-sm text-gray-400 hover:text-green-600 transition mb-8 w-fit">
      <lucide-icon name="arrow-left" class="w-4 h-4"></lucide-icon>
      Voltar
    </a>

    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-gradient-to-br from-green-400 to-teal-500 rounded-2xl flex items-center justify-center shadow-lg shadow-green-200 mx-auto mb-4">
        <lucide-icon name="leaf" class="w-8 h-8 text-white"></lucide-icon>
      </div>
      <h2 class="text-3xl font-black text-gray-900 tracking-tighter">Bem-vindo!</h2>
      <p class="text-gray-400 text-sm font-medium mt-1">Entre para pedir de forma sustentável.</p>
    </div>

    @if (erroLogin) {
      <div class="bg-red-50 border border-red-100 text-red-500 text-sm font-medium rounded-2xl px-4 py-3 mb-6 text-center flex items-center gap-2 justify-center">
        <lucide-icon name="alert-circle" class="w-4 h-4 flex-none"></lucide-icon>
        {{ erroLogin }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="entrar()" class="space-y-5">

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">E-mail</label>
        <div class="relative">
          <lucide-icon name="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300"></lucide-icon>
          <input formControlName="email" type="email" placeholder="seu@email.com"
            class="w-full bg-gray-50 border border-gray-100 rounded-2xl p-4 pl-12 outline-none focus:ring-2 focus:ring-green-400/30 focus:border-green-300 transition-all text-gray-700">
        </div>
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <p class="text-red-400 text-xs mt-1 ml-2">E-mail inválido</p>
        }
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Senha</label>
        <div class="relative">
          <lucide-icon name="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300"></lucide-icon>
          <input formControlName="senha" [type]="mostrarSenha() ? 'text' : 'password'" placeholder="••••••••"
            class="w-full bg-gray-50 border border-gray-100 rounded-2xl p-4 pl-12 pr-14 outline-none focus:ring-2 focus:ring-green-400/30 focus:border-green-300 transition-all text-gray-700">
          <button type="button" (click)="toggleSenha()"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 hover:text-green-500 transition">
            <lucide-icon [name]="mostrarSenha() ? 'eye-off' : 'eye'" class="w-5 h-5"></lucide-icon>
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || carregando"
        class="w-full bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 disabled:from-gray-200 disabled:to-gray-200 disabled:cursor-not-allowed text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-green-200 active:scale-[0.98] mt-2 flex items-center justify-center gap-2">
        @if (carregando) {
          <lucide-icon name="loader" class="w-5 h-5 animate-spin"></lucide-icon>
          Entrando...
        } @else {
          <lucide-icon name="log-in" class="w-5 h-5"></lucide-icon>
          Entrar no App
        }
      </button>

    </form>

    <div class="mt-8 text-center border-t border-gray-50 pt-6">
      <p class="text-gray-400 text-sm font-medium">
        Novo por aqui?
        <a routerLink="/cadastro" class="text-green-600 font-bold hover:underline ml-1">Criar uma conta</a>
      </p>
    </div>
  </div>
</div>
