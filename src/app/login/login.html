<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4 font-sans">
  <div class="bg-white p-10 rounded-[2.5rem] shadow-xl shadow-gray-200/50 w-full max-w-[400px] border border-gray-100">
    
    <div class="text-center mb-10">
      <div class="text-5xl mb-3"></div>
      <h2 class="text-3xl font-black text-gray-900 tracking-tighter">Foodly</h2>
      <p class="text-gray-400 text-sm font-medium mt-1">Sentiu fome? Entre e peça agora.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="entrar()" class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1 mb-2">E-mail</label>
        <input formControlName="email" type="email" placeholder="seu@email.com"
          class="w-full bg-gray-50 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-orange-500/20 transition-all placeholder:text-gray-300">
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1 mb-2">Senha</label>
        <input formControlName="senha" type="password" placeholder="••••••••"
          class="w-full bg-gray-50 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-orange-500/20 transition-all placeholder:text-gray-300">
      </div>

      <button type="submit" [disabled]="loginForm.invalid" 
        class="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-gray-200 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-orange-200 active:scale-[0.98] mt-4 uppercase tracking-widest text-sm">
        Entrar no App
      </button>
    </form>
    
    <div class="mt-8 text-center">
      <p class="text-gray-400 text-sm font-medium">
        Novo por aqui? 
        <a href="/cadastro" class="text-orange-500 font-bold hover:underline ml-1">Criar uma conta</a>
      </p>
    </div>
  </div>
</div>
