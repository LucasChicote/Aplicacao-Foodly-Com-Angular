<div class="flex min-h-screen items-center justify-center bg-gray-50 p-4">
  <form [formGroup]="CadastroForm" (ngSubmit)="enviar()" class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <h2 class="text-2xl font-bold text-orange-600 mb-6 text-center">Cadastro Foodly</h2>

    <div class="space-y-4">
      <input formControlName="nome" placeholder="Nome Completo" class="w-full p-2 border rounded focus:ring-2 focus:ring-orange-500 outline-none">
      <input formControlName="email" type="email" placeholder="E-mail" class="w-full p-2 border rounded focus:ring-2 focus:ring-orange-500 outline-none">
      <input formControlName="senha" type="password" placeholder="Crie uma Senha" class="w-full p-2 border rounded focus:ring-2 focus:ring-orange-500 outline-none">

      <div class="flex gap-2">
        <input formControlName="cep" (input)="buscarEndereco()" maxlength="8" placeholder="CEP (apenas números)" class="flex-1 p-2 border rounded focus:ring-2 focus:ring-orange-500 outline-none">
      </div>

      <input formControlName="rua" placeholder="Rua / Logradouro" class="w-full p-2 border rounded bg-gray-50 text-gray-500">
      <input formControlName="bairro" placeholder="Bairro" class="w-full p-2 border rounded bg-gray-50 text-gray-500">

      <button type="submit" [disabled]="CadastroForm.invalid" class="w-full mt-6 bg-orange-500 hover:bg-orange-600 disabled:bg-gray-300 text-white font-bold py-3 rounded-lg transition">
        Finalizar Cadastro
      </button>
    </div>

    <p class="mt-4 text-center text-sm">
      Já tem conta? <a href="/login" class="text-orange-500 font-bold">Faça Login</a>
    </p>
  </form>
</div>
